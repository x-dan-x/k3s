---
# Longhorn installation (runs on control VM)
- name: Install Longhorn via Helm (GitOps-ready)
  hosts: control
  connection: local
  become: false

  environment:
    K8S_AUTH_KUBECONFIG: "{{ lookup('env','HOME') }}/.kube/config"
    KUBECONFIG: "{{ playbook_dir }}/../kubeconfig/k3s-3.yaml"

  vars:
    longhorn_namespace: longhorn-system
    longhorn_version: "1.11.2"
    longhorn_values_file: "{{ playbook_dir }}/../../cluster/base/longhorn/values.yaml"

  tasks:
#    - name: Label all nodes for Longhorn default disk creation - i dont think its needed here - label is done in playbook01
#      shell: |
#        kubectl label node {{ item }} node.longhorn.io/create-default-disk=true --overwrite
#      loop: "{{ groups['k3s_cluster'] }}"
#      changed_when: false

    - name: Ensure Longhorn namespace exists
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: "{{ longhorn_namespace }}"
        state: present

    - name: Add Longhorn Helm repository
      kubernetes.core.helm_repository:
        name: longhorn
        repo_url: https://charts.longhorn.io

    - name: Install or upgrade Longhorn via Helm (direct CLI)
      shell: |
        helm repo add longhorn https://charts.longhorn.io
        helm repo update
        helm upgrade -i longhorn longhorn/longhorn \
          --namespace {{ longhorn_namespace }} \
          --version {{ longhorn_version }} \
          -f {{ longhorn_values_file }} \
          --wait --timeout 600s
      args:
        executable: /bin/bash
      changed_when: false

#    - name: Install or upgrade Longhorn via Helm
#      kubernetes.core.helm:
#        name: longhorn
#        chart_ref: longhorn/longhorn
#        release_namespace: "{{ longhorn_namespace }}"
#        version: "{{ longhorn_version }}"
#        values_files:
#          - "{{ longhorn_values_file }}"
#        state: present
#        wait: true
#        wait_timeout: "600s"

    - name: Wait for all Longhorn pods to become Ready
      shell: |
        kubectl -n {{ longhorn_namespace }} wait --for=condition=Ready pod --all --timeout=600s
      args:
        executable: /bin/bash
      changed_when: false

