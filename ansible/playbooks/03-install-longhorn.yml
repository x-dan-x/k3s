---
# PART 1 — Host preparation (runs on k3s nodes)
- name: Prepare nodes for Longhorn (Ubuntu 26 + k3s 1.36)
  hosts: k3s_cluster
  become: yes

  tasks:
    - name: Install required Longhorn host packages
      apt:
        name:
          - open-iscsi
          - nfs-common
          - jq
          - bash
          - util-linux
          - cryptsetup
          - xfsprogs
        state: present
        update_cache: yes

    - name: Ensure required kernel modules are loaded
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - iscsi_tcp
        - dm_crypt
        - dm_mod
        - nvme_tcp

    - name: Ensure sysctl settings for Longhorn
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        sysctl_set: yes
        reload: yes
      loop:
        - { name: "fs.inotify.max_user_watches", value: "524288" }
        - { name: "fs.inotify.max_user_instances", value: "512" }


# PART 2 — Longhorn installation (runs on control VM)
- name: Install Longhorn via Helm (GitOps-ready)
  hosts: control
  connection: local
  become: false

  environment:
    K8S_AUTH_KUBECONFIG: "{{ lookup('env','HOME') }}/.kube/config"

  vars:
    longhorn_namespace: longhorn-system
    longhorn_version: "1.11.2"
    longhorn_values_file: "{{ playbook_dir }}/../../cluster/base/longhorn/values.yaml"

  tasks:
    - name: Label all nodes for Longhorn default disk creation
      shell: |
        kubectl label node {{ item }} node.longhorn.io/create-default-disk=true --overwrite
      loop: "{{ groups['k3s_cluster'] }}"
      changed_when: false

    - name: Ensure Longhorn namespace exists
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: "{{ longhorn_namespace }}"
        state: present

    - name: Add Longhorn Helm repository
      kubernetes.core.helm_repository:
        name: longhorn
        repo_url: https://charts.longhorn.io

    - name: Install or upgrade Longhorn via Helm (direct CLI)
      shell: |
        helm repo add longhorn https://charts.longhorn.io
        helm repo update
        helm upgrade -i longhorn longhorn/longhorn \
          --namespace {{ longhorn_namespace }} \
          --version {{ longhorn_version }} \
          -f {{ longhorn_values_file }} \
          --wait --timeout 600s
      args:
        executable: /bin/bash
      changed_when: false

#    - name: Install or upgrade Longhorn via Helm
#      kubernetes.core.helm:
#        name: longhorn
#        chart_ref: longhorn/longhorn
#        release_namespace: "{{ longhorn_namespace }}"
#        version: "{{ longhorn_version }}"
#        values_files:
#          - "{{ longhorn_values_file }}"
#        state: present
#        wait: true
#        wait_timeout: "600s"

    - name: Wait for all Longhorn pods to become Ready
      shell: |
        kubectl -n {{ longhorn_namespace }} wait --for=condition=Ready pod --all --timeout=600s
      args:
        executable: /bin/bash
      changed_when: false

