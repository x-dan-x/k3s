---
# Pre-stage the host directory dependencies across all cluster nodes
- name: Prepare Host CNI Directories
  hosts: k3s_server
  become: true
  tasks:
    - name: Ensure standard system CNI directory exists
      file:
        path: /etc/cni/net.d
        state: directory
        mode: '0755'

    - name: Symlink K3s CNI path to standard system path
      file:
        src: /var/lib/rancher/k3s/agent/etc/cni/net.d/05-cilium.conflist
        dest: /etc/cni/net.d/05-cilium.conflist
        state: link
        force: true

# Deploy the Cilium infrastructure locally from the Control VM
- name: Deploy Cilium Network Architecture
  hosts: control
  connection: local
  become: false

  vars:
    cilium_version: "1.19.4"
    kubeconfig_path: "~/.kube/config"
    crd_base_url: "https://raw.githubusercontent.com/cilium/cilium/v{{ cilium_version }}/pkg/k8s/apis/cilium.io/client/crds/v2"
    cilium_crds:
      - ciliumnetworkpolicies
      - ciliumclusterwidenetworkpolicies
      - ciliumendpoints
      - ciliumnodes
      - ciliumidentities
      - ciliumlocalredirectpolicies
      - ciliumegressgatewaypolicies
      - ciliumcidrgroups
      - ciliumenvoyconfigs

  tasks:
    - name: Create local temporary directory for CRD manifests
      file:
        path: /tmp/cilium_crds
        state: directory
        mode: '0755'

    - name: Download Cilium CRD definitions from repository
      get_url:
        url: "{{ crd_base_url }}/{{ item }}.yaml"
        dest: "/tmp/cilium_crds/{{ item }}.yaml"
        mode: '0644'
      loop: "{{ cilium_crds }}"

    - name: Apply Cilium CRDs to the K3s cluster foundation
      shell: "kubectl apply -f /tmp/cilium_crds/{{ item }}.yaml --kubeconfig {{ kubeconfig_path }}"
      loop: "{{ cilium_crds }}"

    - name: Clean up temporary CRD directory on Control VM
      file:
        path: /tmp/cilium_crds
        state: absent

    - name: Install or upgrade Cilium with native Ingress controller engines
      shell: |
        helm repo add cilium https://helm.cilium.io/
        helm repo update
        helm upgrade -i cilium cilium/cilium \
          --version {{ cilium_version }} \
          --namespace kube-system \
          --kubeconfig {{ kubeconfig_path }} \
          --set kubeProxyReplacement=true \
          --set k8sServiceHost=127.0.0.1 \
          --set k8sServicePort=6443 \
          --set cni.binPath=/opt/cni/bin \
          --set cni.confPath=/etc/cni/net.d \
          --set ingressController.enabled=true \
          --set ingressController.loadbalancerMode=dedicated \
          --set hubble.enabled=true \
          --set hubble.relay.enabled=true \
          --set hubble.ui.enabled=true \
          --set disableJob=true \
          --set k3s.enabled=true
