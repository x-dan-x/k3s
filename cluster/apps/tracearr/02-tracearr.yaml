---
# Tracearr App PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tracearr-app-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
# Tracearr App Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracearr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tracearr
  template:
    metadata:
      labels:
        app: tracearr
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
      containers:
        - name: tracearr
          image: ghcr.io/tracearr/tracearr:latest
          env:
            - name: PORT
              value: "3000"
            - name: REDIS_URL
              value: "redis://tracearr-redis:6379"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: tracearr-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tracearr-db-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: tracearr-db-secret
                  key: POSTGRES_DB
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tracearr-db-secret
                  key: JWT_SECRET
            - name: COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: tracearr-db-secret
                  key: JWT_SECRET
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@tracearr-db:5432/$(POSTGRES_DB)"
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: app-data
              mountPath: /app/data
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: tracearr-app-pvc
---
# Tracearr App Service
apiVersion: v1
kind: Service
metadata:
  name: tracearr
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app: tracearr
