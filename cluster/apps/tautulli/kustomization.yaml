apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - tautulli.yaml

helmCharts:
  - name: tautulli
    repo: oci://ghcr.io/tautulli/tautulli-chart
    version: 2.15.1 # Pins the stable chart version matching the current release cycle
    releaseName: tautulli
    namespace: tautulli
    valuesInline:
      # Forces the Service, Deployment/StatefulSet, and Pods to be named "tautulli-service"
      fullnameOverride: "tautulli-service"

      image:
        repository: ghcr.io/tautulli/tautulli
        tag: latest
        pullPolicy: IfNotPresent

      timezone: "Australia/Sydney"

      # Injects Dan's standard environment credentials
      puid: 1000
      pgid: 100

      persistence:
        config:
          enabled: true
          existingClaim: "tautulli-config-pvc"

      service:
        type: ClusterIP
        port: 80

      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
