apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: media-routes
  namespace: media
spec:
  parentRefs:
  - name: lan-gateway
    namespace: kube-system
  hostnames:
  - "sab.dtxlan.net"
  - "txvpn.dtxlan.net"
  rules:
  - matches:
    - hostname: "sab.dtxlan.net"
    backendRefs:
    - name: sabnzbd-service
      port: 8080 # Match the internal cluster service port you set for SAB
  - matches:
    - hostname: "txvpn.dtxlan.net"
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /transmission/web/
    backendRefs:
    - name: transmission-vpn-service
      port: 9091 # Direct connection to Transmission's daemon port
