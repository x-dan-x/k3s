apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - seerr.yaml

helmCharts:
  - name: seerr-chart
    repo: oci://ghcr.io/seerr-team/seerr
    version: 3.7.0 
    releaseName: seerr
    namespace: seerr 
    valuesInline:
      fullnameOverride: "seerr"
      image:
        repository: ghcr.io/seerr-team/seerr
        tag: latest
        pullPolicy: IfNotPresent

      timezone: "Australia/Sydney"

      persistence:
        config:
          enabled: true
          existingClaim: "seerr-config-pvc"
          mountPath: /app/config

      service:
        type: ClusterIP
        port: 80
        # ◄── Removed the unsupported service name property from here

      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 1Gi

# ─── FIX: MOVEd OUTSIDE OF HELMCHARTS BLOCKS (TOP-LEVEL DIRECTIVE) ───
patches:
  - target:
      kind: Service
      name: seerr
    patch: |-
      - op: replace
        path: /metadata/name
        value: seerr-service
