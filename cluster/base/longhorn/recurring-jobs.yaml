apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: daily-snapshots
spec:
  cron: "0 3 * * *"
  task: "snapshot"
  groups:
    - default
  retain: 7
  concurrency: 1

---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: weekly-backups
spec:
  cron: "0 4 * * 0"
  task: "backup"
  groups:
    - default
  retain: 4
  concurrency: 1

