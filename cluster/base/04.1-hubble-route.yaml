apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hubble-route
  namespace: kube-system # Lives right alongside the gateway and hubble-ui svc
spec:
  parentRefs:
  - name: lan-gateway
    namespace: kube-system
  hostnames:
  - "hubble.dtxlan.net"
  rules:
  - backendRefs:
    - name: hubble-ui  # <--- Make sure this matches the exact name from Step 1
      port: 80         # <--- Make sure this matches the service port from Step 1
