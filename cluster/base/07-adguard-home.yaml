apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: adguard-data
  namespace: kube-system
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn # Backed by your freshly fixed storage layer!
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguard-home
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adguard-home
  template:
    metadata:
      labels:
        app: adguard-home
    spec:
      containers:
      - name: adguard-home
        image: adguard/adguardhome:latest
        ports:
        - containerPort: 53
          name: dns-udp
          protocol: UDP
        - containerPort: 53
          name: dns-tcp
          protocol: TCP
        - containerPort: 3000
          name: web-setup   # The initial setup wizard port
        - containerPort: 80
          name: web-admin   # The actual dashboard panel port
        volumeMounts:
        - name: data
          mountPath: /opt/adguardhome/work
        - name: config
          mountPath: /opt/adguardhome/conf
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: adguard-data
      - name: config
        emptyDir: {} # Config file resets safely on fresh builds; or map to persistent volume
---
apiVersion: v1
kind: Service
metadata:
  name: adguard-home
  namespace: kube-system
  labels:
    app: adguard-home
spec:
  type: LoadBalancer
  selector:
    app: adguard-home
  ports:
  - name: dns-udp
    protocol: UDP
    port: 53
    targetPort: 53
  - name: dns-tcp
    protocol: TCP
    port: 53
    targetPort: 53
  - name: web-setup
    port: 3000
    targetPort: 3000
  - name: web-admin
    port: 80
    targetPort: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: adguard-route
  namespace: kube-system
spec:
  parentRefs:
  - name: lan-gateway
    namespace: kube-system
  hostnames:
  - "adguard.dtx.lan"
  rules:
  - backendRefs:
    - name: adguard-home
      port: 80 # Map to 3000 first so you can complete the initial web wizard setup!
