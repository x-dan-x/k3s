---
# TimescaleDB PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tracearr-db-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
# TimescaleDB StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tracearr-db
spec:
  serviceName: tracearr-db
  replicas: 1
  selector:
    matchLabels:
      app: tracearr-db
  template:
    metadata:
      labels:
        app: tracearr-db
    spec:
      containers:
        - name: timescale
          image: timescale/timescaledb:latest-pg15
          envFrom:
            - secretRef:
                name: tracearr-db-secret
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: tracearr-db-pvc
---
# TimescaleDB Service
apiVersion: v1
kind: Service
metadata:
  name: tracearr-db
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: tracearr-db
---
# Redis Deployment & Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracearr-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tracearr-redis
  template:
    metadata:
      labels:
        app: tracearr-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
---
apiVersion: v1
kind: Service
metadata:
  name: tracearr-redis
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: tracearr-redis

