---
- name: Install HA k3s cluster servers sequentially
  hosts: k3s_cluster
  become: yes
  serial: 1
  gather_facts: yes

  vars:
    k3s_version: "v1.36.1+k3s1"
    k3s_server_args: >
      --disable traefik
      --flannel-backend=none
      --disable-network-policy
      --disable-kube-proxy
      --write-kubeconfig-mode=644
      --node-ip={{ ansible_host }}
      --tls-san={{ ansible_host }}
      --node-taint CriticalAddonsOnly=true:NoExecute

  tasks:
    - name: Check if k3s is already installed
      stat:
        path: /etc/rancher/k3s/k3s.yaml
      register: k3s_installed

    # INITIALIZE FIRST MASTER
    - name: Create K3s configuration directory (First Node)
      file:
        path: /etc/rancher/k3s
        state: directory
        mode: '0755'
      when: inventory_hostname == groups['k3s_server'][0]

    - name: Write K3s cluster-init configuration file (First Node)
      copy:
        dest: /etc/rancher/k3s/config.yaml
        owner: root
        group: root
        mode: '0644'
        content: |
          cluster-init: true
          node-ip: "{{ ansible_host }}"
          tls-san: "{{ ansible_host }}"
          flannel-backend: "none"
          disable-network-policy: true
          disable-kube-proxy: true
          disable:
            - traefik
          write-kubeconfig-mode: "644"
      when: inventory_hostname == groups['k3s_server'][0]

    - name: Install k3s server (cluster-init on first node)
      shell: "curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION='{{ k3s_version | trim }}' sh -s - server"
      args:
        creates: /usr/local/bin/k3s
      when: inventory_hostname == groups['k3s_server'][0]

    - name: Read cluster token from first node
      slurp:
        src: /var/lib/rancher/k3s/server/token
      register: main_token
      delegate_to: "{{ groups['k3s_server'][0] }}"

    # JOIN SUBSEQUENT MASTERS
# JOIN SUBSEQUENT MASTERS
    - name: Create K3s configuration directory
      file:
        path: /etc/rancher/k3s
        state: directory
        mode: '0755'
      when: inventory_hostname != groups['k3s_server'][0]

    - name: Write K3s joining configuration file
      copy:
        dest: /etc/rancher/k3s/config.yaml
        owner: root
        group: root
        mode: '0644'
        content: |
          server: "https://{{ hostvars[groups['k3s_server'][0]].ansible_host }}:6443"
          token: "{{ main_token.content | b64decode | trim }}"
          node-ip: "{{ ansible_host }}"
          tls-san: "{{ ansible_host }}"
          flannel-backend: "none"
          disable-network-policy: true
          disable-kube-proxy: true
          disable:
            - traefik
          write-kubeconfig-mode: "644"
          node-taint:
            - "CriticalAddonsOnly=true:NoExecute"
      when: inventory_hostname != groups['k3s_server'][0]

    - name: Install k3s server (join existing HA cluster)
      shell: "curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION='{{ k3s_version | trim }}' sh -s - server"
      args:
        creates: /usr/local/bin/k3s
      when: inventory_hostname != groups['k3s_server'][0]

    - name: Ensure k3s service is enabled and running
      systemd:
        name: k3s
        state: started
        enabled: yes

    # DOWNLOAD RUNTIME CREDENTIALS TO CONTROL VM ENVIRONMENT
    - name: Fetch kubeconfig to control VM
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "~/.kube/config"
        flat: yes
      when: inventory_hostname == groups['k3s_server'][0]

    - name: Fix kubeconfig host destination pointer on Control VM
      delegate_to: localhost
      become: false
      run_once: true
      replace:
        path: "~/.kube/config"
        regexp: '127.0.0.1'
        replace: "{{ hostvars[groups['k3s_server'][0]].ansible_host }}"

    # KUBERNETES LABELLING PHASES
    - name: Label node roles
      delegate_to: localhost
      become: false
      shell: |
        kubectl label node {{ inventory_hostname }} node-role.kubernetes.io/control-plane=true --overwrite
        kubectl label node {{ inventory_hostname }} node-role.kubernetes.io/worker=true --overwrite
        kubectl label node {{ inventory_hostname }} node.longhorn.io/create-default-disk=true --overwrite

    - name: Check for physical GPU character device node paths
      stat:
        path: /dev/dri
      register: internal_dri

    - name: Label GPU nodes cleanly
      delegate_to: localhost
      become: false
      shell: |
        kubectl label node {{ inventory_hostname }} node.kubernetes.io/gpu=true --overwrite
      when: internal_dri.stat.exists
