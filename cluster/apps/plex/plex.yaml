apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-config-pvc
  namespace: plex
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 40Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-omv-all-pv-plex # ◄── Unique name for this global PV handle
  namespace: plex
spec:
  capacity:
    storage: 100Ti
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-omv-all # ◄── Unique matching string just for Plex
  mountOptions:
    - noatime
    - async
    - rsize=262144
    - wsize=262144
    - hard
    - timeo=600
    - retrans=2
  nfs:
    server: 192.168.10.120 # ◄── Your OMV IP
    path: /export/all    # ◄── Your OMV Path
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nfs-all-media-pvc
  namespace: plex
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-omv-all # ◄── Explicitly matches the new PV tag above
  resources:
    requests:
      storage: 100Ti
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
  labels:
    app: plex
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: plex
  template:
    metadata:
      labels:
        app: plex
    spec:
      securityContext:
#        runAsUser: 1000
#        runAsGroup: 100
#        runAsNonRoot: true
        supplementalGroups:
          - 44   # Passes the host 'video' group membership
          - 991  # Passes the host 'render' group membership    
      nodeSelector:
        gpu.intel.com/i915: "true"
      containers:
        - name: plex
          image: lscr.io/linuxserver/plex
          env:
          - name: TZ
            value: "Australia/Sydney"
          - name: PLEX_CLAIM
            valueFrom:
              secretKeyRef:
                name: plex-claim-secret
                key: PLEX_CLAIM
          - name: PUID
            value: "1000"
          - name: PGID
            value: "100"
          ports:
            - containerPort: 32400
              name: pms
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /data
            - name: ram-transcode
              mountPath: /transcode
            - name: dshm
              mountPath: /dev/shm
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 6Gi
              gpu.intel.com/i915: 1
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: plex-config-pvc
        - name: media
          persistentVolumeClaim:
            claimName: nfs-all-media-pvc
        - name: ram-transcode
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: plex-service
  labels:
    app: plex # ◄── Triggers Cilium IPPool match once your 01-ipam file is updated
  annotations:
    io.cilium/lb-ipam-ips: 192.168.10.18
spec:
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  ports:
    - port: 32400
      targetPort: 32400
      name: pms
  selector:
    app: plex
