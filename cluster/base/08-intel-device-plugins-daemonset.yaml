apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: intel-gpu-plugin
  namespace: kube-system
  labels:
    app: intel-gpu-plugin
spec:
  selector:
    matchLabels:
      app: intel-gpu-plugin
  template:
    metadata:
      labels:
        app: intel-gpu-plugin
    spec:
      nodeSelector:
        gpu.intel.com/i915: "true"
      containers:
      - name: intel-gpu-plugin
        image: intel/intel-gpu-plugin:0.36.0
        securityContext:
          privileged: true
        volumeMounts:
        - name: devfs
          mountPath: /dev/dri
          readOnly: true
        - name: sysfs
          mountPath: /sys/class/drm
          readOnly: true
        - name: devplugindir
          mountPath: /var/lib/kubelet/device-plugins
          mountPropagation: Bidirectional
      volumes:
      - name: devfs
        hostPath:
          path: /dev/dri
      - name: sysfs
        hostPath:
          path: /sys/class/drm
      - name: devplugindir
        hostPath:
          # ─── UPDATED TO STANDARD KUBERNETES PATH ───
          path: /var/lib/kubelet/device-plugins
