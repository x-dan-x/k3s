apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
data:
  # Modern syntax for service declarations
  services.yaml: |
    - Cluster Management:
        - Argo CD:
            icon: "argo-cd"
            href: "https://argo.dtxlan.net"
            description: "GitOps Deployment Engine"
        - Longhorn:
            icon: "longhorn"
            href: "https://longhorn.dtxlan.net"
            description: "Node storage management"
    - Networking:
        - AdGuard Home:
            icon: "adguard-home"
            href: "https://adguard.dtxlan.net"
            description: "DNS manager"
  settings.yaml: |
    title: dtxlan.net Home
    base: https://homepage.dtxlan.net
  # Empty placeholders so the v1.x engine doesn't crash on missing files
  bookmarks.yaml: |
    []
  widgets.yaml: |
    []
  custom.css: |
    /* Custom styles go here */
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      containers:
      - name: homepage
        image: ghcr.io/gethomepage/homepage:v1.13.2  # Fully modernized target
        ports:
        - containerPort: 3000
        env:
        - name: HOMEPAGE_ALLOWED_HOSTS
          value: "*"
        volumeMounts:
        - name: config
          mountPath: /app/config/settings.yaml
          subPath: settings.yaml
        - name: config
          mountPath: /app/config/services.yaml
          subPath: services.yaml
        - name: config
          mountPath: /app/config/bookmarks.yaml
          subPath: bookmarks.yaml
        - name: config
          mountPath: /app/config/widgets.yaml
          subPath: widgets.yaml
        - name: config
          mountPath: /app/config/custom.css
          subPath: custom.css
      volumes:
      - name: config
        configMap:
          name: homepage-config
---
apiVersion: v1
kind: Service
metadata:
  name: homepage-service
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
  selector:
    app: homepage
