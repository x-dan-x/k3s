apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
data:
  # Modern syntax for service declarations
  services.yaml: |
    - Cluster Management:
        - Argo CD:
            icon: argocd
            href: https://argo.dtxlan.net
            description: GitOps Deployment Engine
  settings.yaml: |
    title: dtxlan.net Home
    base: https://homepage.dtxlan.net
  # Empty placeholders so the v1.x engine doesn't crash on missing files
  bookmarks.yaml: |
    []
  widgets.yaml: |
    []
  custom.css: |
    /* Custom styles go here */
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      containers:
      - name: homepage
        image: ghcr.io/gethomepage/homepage:v1.13.2  # Fully modernized target
        ports:
        - containerPort: 3000
        # --- THIS ENVIRONMENT BLOCK FIXES THE 500 ERROR ---
        env:
        - name: HOMEPAGE_ALLOWED_HOSTS
          value: "homepage.dtxlan.net"
        # -------------------------------------------------
        volumeMounts:
        - name: config
          mountPath: /app/config
      volumes:
      - name: config
        configMap:
          name: homepage-config
---
apiVersion: v1
kind: Service
metadata:
  name: homepage-service
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
  selector:
    app: homepage
