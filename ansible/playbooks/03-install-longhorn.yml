---
# ==============================================================================
# PLAY 1: Host Preparation (Runs across the K3s Node Cluster)
# ==============================================================================
- name: Prepare Infrastructure Nodes for Longhorn Dedicated Storage
  hosts: k3s_server
  become: true
  gather_facts: true
  vars:
    target_disk: "/dev/sdb"
    mount_point: "/var/lib/longhorn"

  tasks:
    - name: Ensure target mount directory exists
      file:
        path: "{{ mount_point }}"
        state: directory
        mode: '0755'

    - name: Create ext4 filesystem on the dedicated 400G storage disk
      filesystem:
        fstype: ext4
        dev: "{{ target_disk }}"

    - name: Mount and map disk into fstab for persistent boot retention
      mount:
        path: "{{ mount_point }}"
        src: "{{ target_disk }}"
        fstype: ext4
        opts: defaults,discard
        state: mounted

    - name: Configure multipathd exclusion rule for Longhorn cluster engines
      copy:
        content: |
          blacklist {
              devnode "^longhorn[^/]*"
          }
        dest: /etc/multipath.conf
        mode: '0644'

    - name: Restart multipathd daemon to absorb configuration changes
      service:
        name: multipathd
        state: restarted
        enabled: true
      ignore_errors: true  # Prevents failure if a node doesn't have multipathd running

# ==============================================================================
# PLAY 2: Orchestration (Runs locally on Control VM to interact with API)
# ==============================================================================
- name: Install Longhorn via Helm (GitOps-ready)
  hosts: control
  connection: local
  become: false

  environment:
    K8S_AUTH_KUBECONFIG: "{{ lookup('env','HOME') }}/.kube/config"
    KUBECONFIG: "{{ lookup('env','HOME') }}/.kube/config"

  vars:
    longhorn_namespace: longhorn-system
    longhorn_version: "1.11.2"
    longhorn_values_file: "{{ playbook_dir }}/../../cluster/base/longhorn/values.yaml"

  tasks:
    - name: Ensure Longhorn namespace exists
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: "{{ longhorn_namespace }}"
        state: present

    - name: Add Longhorn Helm repository
      kubernetes.core.helm_repository:
        name: longhorn
        repo_url: https://charts.longhorn.io

    - name: Install or upgrade Longhorn via Helm (direct CLI)
      shell: |
        helm repo add longhorn https://charts.longhorn.io
        helm repo update
        helm upgrade -i longhorn longhorn/longhorn \
          --namespace {{ longhorn_namespace }} \
          --version {{ longhorn_version }} \
          -f {{ longhorn_values_file }} \
          --wait --timeout 600s
      args:
        executable: /bin/bash
      changed_when: false

    - name: Wait for all Longhorn pods to become Ready
      shell: |
        kubectl -n {{ longhorn_namespace }} wait --for=condition=Ready pod --all --timeout=600s
      args:
        executable: /bin/bash
      changed_when: false
