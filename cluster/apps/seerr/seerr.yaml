apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seerr-config-pvc
  namespace: seerr
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 8Gi
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: seerr-route
  namespace: seerr
spec:
  parentRefs:
  - name: lan-gateway
    namespace: kube-system
  hostnames:
  - "requests.dtxlan.net"
  - "seerr.dtxlan.net"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: "seerr-service"
      port: 80 # The official Helm chart exposes the service on port 80 by default
