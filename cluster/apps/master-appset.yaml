apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-apps
  namespace: argocd
spec:
  generators:
    # The Git generator crawls your repo looking for directories
    - git:
        repoURL: 'https://github.com/x-dan-x/k3s.git'
        revision: HEAD
        directories:
          - path: cluster/apps/* # Watches every folder inside cluster/apps/
  template:
    metadata:
      # Automatically names the app after the folder (e.g., cluster-apps-adguard)
      name: 'app-{{path.basename}}'
    spec:
      project: default
      source:
        repoURL: 'https://github.com/x-dan-x/k3s.git'
        targetRevision: HEAD
        path: '{{path}}'         # Automatically points to the discovered folder
      destination:
        server: 'https://kubernetes.default.svc'
        # Automatically deploys to a namespace matching the folder name
        namespace: '{{path.basename}}' 
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true  # Creates the namespace if it doesn't exist yet
