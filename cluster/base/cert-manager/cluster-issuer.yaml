apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: letsencrypt@johnsonland.net
    privateKeySecretRef:
      name: letsencrypt-production-account-key
    solvers:
    - dns01:
        cloudflare:
          email: cloudflare@johnsonland.net
          apiTokenSecretRef:
            name: cloudflare-api-token # This name must match your decrypted secret target
            key: api-token
