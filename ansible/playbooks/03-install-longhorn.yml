---
- name: Install Longhorn on k3s (GitOps-ready)
  hosts: control
  become: yes

  vars:
    longhorn_namespace: longhorn-system
    longhorn_values_file: "{{ playbook_dir }}/../../cluster/base/longhorn/values.yaml"

  tasks:

    - name: Ensure Longhorn namespace exists
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: "{{ longhorn_namespace }}"
        state: present
      delegate_to: localhost

    - name: Add Longhorn Helm repository
      kubernetes.core.helm_repository:
        name: longhorn
        repo_url: https://charts.longhorn.io
      delegate_to: localhost

    - name: Install or upgrade Longhorn via Helm
      kubernetes.core.helm:
        name: longhorn
        chart_ref: longhorn/longhorn
        release_namespace: "{{ longhorn_namespace }}"
        values_files:
          - "{{ longhorn_values_file }}"
        state: present
        wait: true
        wait_timeout: 600
      delegate_to: localhost

    - name: Wait for all Longhorn pods to become Ready
      shell: |
        kubectl -n {{ longhorn_namespace }} wait \
          --for=condition=Ready pod --all --timeout=600s
      changed_when: false
      delegate_to: localhost

