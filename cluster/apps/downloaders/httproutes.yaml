apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sabnzbd-route
  namespace: downloaders
spec:
  parentRefs:
  - name: lan-gateway
    namespace: kube-system
  hostnames:
  - "sab.dtxlan.net"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: sabnzbd-service
      port: 80 # <-- Matches the 80/TCP port from your kubectl output
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: transmission-route
  namespace: downloaders
spec:
  parentRefs:
  - name: lan-gateway
    namespace: kube-system
  hostnames:
  - "txvpn.dtxlan.net"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: transmission-vpn-service
      port: 80 # <-- Matches the 80/TCP port from your kubectl output
