---
- name: Install k3s server (no flannel)
  hosts: k3s_cluster
  become: yes

  tasks:

    - name: Ensure required kernel modules are loaded
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - br_netfilter
        - overlay

    - name: Ensure sysctl settings are applied
      command: sysctl --system

    - name: Install k3s server
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--flannel-backend=none --disable-network-policy" sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Ensure k3s service is running
      systemd:
        name: k3s
        state: started
        enabled: yes

    - name: Ensure k3s data directory exists
      file:
        path: /var/lib/rancher
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Fetch kubeconfig to control VM
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ playbook_dir }}/../kubeconfig/{{ inventory_hostname }}.yaml"
        flat: yes

