---
- name: Install or upgrade Cilium on k3s (Kubernetes 1.36, safe mode)
  hosts: k3s_cluster
  become: yes

  vars:
    cilium_version: "v1.19.3"
    kubeconfig_path: "/etc/rancher/k3s/k3s.yaml"

  tasks:

    - name: Ensure BPF filesystem is mounted
      mount:
        path: /sys/fs/bpf
        src: bpffs
        fstype: bpf
        state: mounted

    - name: Ensure rp_filter is disabled (required for Cilium on Ubuntu 26)
      sysctl:
        name: "{{ item }}"
        value: "0"
        state: present
        sysctl_set: yes
        reload: yes
      loop:
        - net.ipv4.conf.all.rp_filter
        - net.ipv4.conf.default.rp_filter

    - name: Check if Cilium CLI is installed
      stat:
        path: /usr/local/bin/cilium
      register: cilium_cli

    - name: Install Cilium CLI
      shell: |
        curl -L --fail https://github.com/cilium/cilium-cli/releases/latest/download/cilium-linux-amd64.tar.gz \
          | tar xz -C /usr/local/bin
      when: not cilium_cli.stat.exists

    - name: Check if Cilium is already installed
      shell: cilium status --kubeconfig {{ kubeconfig_path }} --wait --timeout 5s
      register: cilium_status
      failed_when: false
      changed_when: false

    - name: Install or upgrade Cilium (safe mode for k3s + Ubuntu 26 + Intel NIC)
      shell: |
        if cilium status --kubeconfig {{ kubeconfig_path }} >/dev/null 2>&1; then
          echo "Upgrading Cilium..."
          cilium upgrade \
            --version {{ cilium_version }} \
            --kubeconfig {{ kubeconfig_path }} \
            --reuse-values=false \
            --set kubeProxyReplacement=false \
            --set routingMode=tunnel \
            --set autoDirectNodeRoutes=false \
            --set ipv4NativeRoutingCIDR="" \
            --set bpf.masquerade=false \
            --set hostRouting=false \
            --set hubble.enabled=true \
            --set hubble.relay.enabled=true \
            --set hubble.ui.enabled=true
        else
          echo "Installing Cilium..."
          cilium install \
            --version {{ cilium_version }} \
            --kubeconfig {{ kubeconfig_path }} \
            --set kubeProxyReplacement=false \
            --set routingMode=tunnel \
            --set autoDirectNodeRoutes=false \
            --set ipv4NativeRoutingCIDR="" \
            --set bpf.masquerade=false \
            --set hostRouting=false \
            --set hubble.enabled=true \
            --set hubble.relay.enabled=true \
            --set hubble.ui.enabled=true
        fi
      changed_when: true

    - name: Wait for Cilium to become ready
      shell: cilium status --kubeconfig {{ kubeconfig_path }} --wait
      register: cilium_ready
      changed_when: false

