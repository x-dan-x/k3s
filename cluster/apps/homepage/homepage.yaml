apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: dtxlan.net Home
    base: https://homepage.dtxlan.net
  # Modern syntax for service declarations
  services.yaml: |
    - Cluster Management:
        - Argo CD:
            icon: "argo-cd"
            href: "https://argo.dtxlan.net"
            description: "GitOps Deployment Engine"
        - Longhorn:
            icon: "longhorn"
            href: "https://longhorn.dtxlan.net"
            description: "Node storage management"
    - Apps:
        - Plex:
            icon: "plex"
            href: "https://plex.dtxlan.net"
            description: "Plex Media Server"
        - Seerr:
            icon: "seerr"
            href: "https://seerr.dtxlan.net"
            description: "Request Management"
        - Tautulli:
            icon: "tautulli"
            href: "https://tautulli.dtxlan.net"
            description: "Plex Stats"
        - MediaLyze:
            icon: "medialyze"
            href: "https://medialyze.dtxlan.net"
            description: "Media Stats"
    - Arrs:
        - Radarr:
            icon: "radarr"
            href: "https://radarr.dtxlan.net"
            description: "Movie Management"
        - Sonarr:
            icon: "sonarr"
            href: "https://sonarr.dtxlan.net"
            description: "TV Series Management"
        - Lidarr:
            icon: "lidarr"
            href: "https://lidarr.dtxlan.net"
            description: "Music Management"
        - Bazarr:
            icon: "bazarr"
            href: "https://bazarr.dtxlan.net"
            description: "Subtitle Management"
    - Downloaders:
        - SABnzbd:
            icon: "sabnzbd"
            href: "https://sabnzbd.dtxlan.net"
            description: "NZB Downloader"
        - Transmission-vpn:
            icon: "transmission-vpn"
            href: "https://txvpn.dtxlan.net"
            description: "Torrent Downloader"
    - Networking:
        - AdGuard Home:
            icon: "adguard-home"
            href: "https://adguard.dtxlan.net"
            description: "DNS manager"
        - Hubble:
            icon: "hubble"
            href: "https://hubble.dtxlan.net"
            description: "Cluster netflows"
        - Pangolin:
            icon: "pangolin"
            href: "https://pangolin.johnsonland.net"
            description: "VPS management"

          
            # Empty placeholders so the v1.x engine doesn't crash on missing files
  bookmarks.yaml: |
    []
  widgets.yaml: |
    []
  custom.css: |
    /* Custom styles go here */
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: homepage-storage
  namespace: homepage
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn # Tells K3s to dynamically request storage from Longhorn
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      # --- THE SMART INIT CONTAINER ---
      initContainers:
      - name: init-config-sync
        image: busybox:latest
        command:
          - sh
          - -c
          - |
            echo "Populating Git configuration to Longhorn..."
            cp -r /tmp/git-config/. /app/config/
            
            echo "Setting write permissions..."
            chmod -R 777 /app/config
            echo "Configuration sync complete."
        volumeMounts:
        - name: git-raw-config
          mountPath: /tmp/git-config
        - name: app-storage
          mountPath: /app/config
      # --- THE HOMEPAGE APPLICATION ---
      containers:
      - name: homepage
        image: ghcr.io/gethomepage/homepage
        ports:
        - containerPort: 3000
        env:
        - name: HOMEPAGE_ALLOWED_HOSTS
          value: "*"
        volumeMounts:
        - name: app-storage # Mounts the complete folder cleanly without complex subPath constraints
          mountPath: /app/config
      volumes:
      - name: app-storage
        persistentVolumeClaim:
          claimName: homepage-storage # Backend storage tier
      - name: git-raw-config
        configMap:
          name: homepage-config # Read-only Git payload
---
apiVersion: v1
kind: Service
metadata:
  name: homepage-service
  namespace: homepage
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
  selector:
    app: homepage # This connects the service straight to your deployment pods
