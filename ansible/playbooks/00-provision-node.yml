---
- name: Provision Ubuntu 26.04 node
  hosts: k3s_cluster
  become: yes
  gather_facts: yes

  tasks:
    - name: Ensure passwordless sudo for Ansible user
      copy:
        dest: /etc/sudoers.d/99-ansible-nopasswd
        content: "{{ ansible_user }} ALL=(ALL) NOPASSWD:ALL\n"
        mode: '0440'

    - name: Ensure control-vm SSH key is authorized
      authorized_key:
        user: "{{ ansible_user }}"
        state: present
        key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade system packages
      apt:
        upgrade: dist
        autoremove: yes

    - name: Install base packages
      apt:
        name:
          - curl
          - wget
          - git
          - jq
          - vim
          - nfs-common
          - net-tools
          - htop
          - unzip
          - ca-certificates
          - open-iscsi
          - wireguard-tools
          - bash
          - util-linux
          - cryptsetup
          - xfsprogs
          - ethtool
          - qemu-guest-agent
        state: present

    - name: Configure Vim to disable mouse mode
      copy:
        dest: /etc/vim/vimrc.local
        content: |
          " Disable mouse so right-click pastes instead of entering visual mode
          set mouse=
          " Enable system clipboard integration
          set clipboard=unnamedplus
          set backspace=indent,eol,start
          syntax on
        owner: root
        group: root
        mode: '0644'

    - name: Install Intel GPU drivers
      apt:
        name:
          - intel-media-va-driver-non-free
          - intel-opencl-icd
          - intel-gpu-tools
          - vainfo
        state: present

    - name: Ensure /dev/dri exists
      stat:
        path: /dev/dri
      register: dri_path

    - name: Warn if GPU not detected
      debug:
        msg: "WARNING: /dev/dri not found — hardware acceleration may not work"
      when: not dri_path.stat.exists

    - name: Enable kernel modules for container workloads
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          br_netfilter
          overlay
          wireguard
          i915
          iscsi_tcp
          dm_crypt
          dm_mod
          nvme_tcp
        owner: root
        group: root
        mode: '0644'

    - name: Ensure required kernel modules are loaded
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - br_netfilter
        - overlay
        - i915
        - iscsi_tcp
        - dm_crypt
        - dm_mod
        - nvme_tcp

    - name: Disable Swap (Required for k3s)
      command: swapoff -a
      when: ansible_facts.memory_mb.swap.total | default(0) > 0

    - name: Permanently Disable Swap in /etc/fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*swap.*)$'
        replace: '# \1'

    - name: Create Longhorn backup mount directory
      file:
        path: /mnt/backups
        state: directory
        mode: '0755'

    - name: Mount NFS backup target
      mount:
        path: /mnt/backups
        src: 192.168.10.120:/export/all/backups
        fstype: nfs
        opts: rw,sync,noatime,nodiratime,rsize=131072,wsize=131072
        state: mounted
        boot: yes

    - name: Read current GRUB_CMDLINE_LINUX
      command: awk -F\" '/^GRUB_CMDLINE_LINUX=/{print $2}' /etc/default/grub
      register: grub_line
      changed_when: false

    - name: Append pcie_aspm=off to GRUB_CMDLINE_LINUX if missing
      lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX='
        line: "GRUB_CMDLINE_LINUX=\"{{ grub_line.stdout }} pcie_aspm=off\""
      when: "'pcie_aspm=off' not in grub_line.stdout"
      notify: update grub

    - name: Ensure igc driver is present
      command: modinfo igc
      register: igc_info
      changed_when: false
      failed_when: igc_info.rc != 0

    - name: Persist ethtool ring buffer & hardware offloading disabling rules
      copy:
        dest: /etc/systemd/system/disable-nic-offload.service
        content: |
          [Unit]
          Description=Disable NIC hardware offloading features for Cilium
          After=network.target

          [Service]
          Type=oneshot
          ExecStart=/bin/bash -c "if [ -d /sys/class/net/eth0 ]; then /sbin/ethtool -K eth0 tx off rx off tso off gso off; fi"
          ExecStart=/bin/bash -c "if [ -d /sys/class/net/ens18 ]; then /sbin/ethtool -K ens18 tx off rx off tso off gso off; fi"
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target
        owner: root
        group: root
        mode: '0644'

    - name: Enable nic offload service
      systemd:
        name: disable-nic-offload.service
        enabled: yes
        state: started

    - name: Enable iSCSI Service
      systemd:
        name: iscsid
        enabled: yes
        state: started

    - name: Add user to 'render' group
      user:
        name: "{{ ansible_user }}"
        groups: render
        append: yes

    - name: Apply sysctl settings
      copy:
        dest: /etc/sysctl.d/99-k8s.conf
        content: |
          net.ipv4.ip_forward = 1
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          fs.inotify.max_user_watches = 524288
          fs.inotify.max_user_instances = 512
        owner: root
        group: root
        mode: '0644'

    - name: Reload sysctl
      command: sysctl --system

# ---------------------------------------------------------
    # CILIUM NETWORK ENGINE PATCHES
    # ---------------------------------------------------------
    - name: Ensure systemd-networkd override directory exists
      file:
        path: /etc/systemd/networkd.conf.d
        state: directory
        mode: '0755'

    - name: Prevent systemd-networkd from dropping Cilium eBPF routes
      copy:
        dest: /etc/systemd/networkd.conf.d/disable-foreign-routes.conf
        content: |
          [Network]
          ManageForeignRoutes=no
          ManageForeignRoutingPolicyRules=no
        owner: root
        group: root
        mode: '0644'
      notify: restart networkd

    # (Keep your existing reboot task at the very bottom of the playbook)

    - name: Reboot if required
      reboot:
        msg: "Rebooting after provisioning"
        connect_timeout: 5
        reboot_timeout: 600

  handlers:
    - name: update grub
      command: update-grub

    - name: restart networkd
      systemd:
        name: systemd-networkd
        state: restarted
        enabled: yes
