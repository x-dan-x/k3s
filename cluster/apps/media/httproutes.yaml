apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: media-routes
  namespace: media
spec:
  parentRefs:
  - name: lan-gateway
    namespace: kube-system
  hostnames:
  - "sab.dtxlan.net"
  - "txvpn.dtxlan.net"
  rules:
  - matches:
    - headers:
      - name: Host
        value: "sab.dtxlan.net"
    backendRefs:
    - name: sabnzbd-service
      port: 80
  - matches:
    - headers:
      - name: Host
        value: "txvpn.dtxlan.net"
    backendRefs:
    - name: transmission-vpn-service
      port: 9091
