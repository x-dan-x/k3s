[control]
controlvm ansible_connection=local

[pve_hosts]
pve-1 ansible_host=192.168.10.11
pve-2 ansible_host=192.168.10.12
pve-3 ansible_host=192.168.10.13
# Note: You mentioned 2 physical machines running 3 VMs, so we map the two hosts here.

[k3s_server]
k3s-1 ansible_host=192.168.10.21 pve_node=pve-1 vmid=101
k3s-2 ansible_host=192.168.10.22 pve_node=pve-2 vmid=102
k3s-3 ansible_host=192.168.10.23 pve_node=pve-2 vmid=103

[k3s_cluster:children]
k3s_server

[pve_hosts:vars]
ansible_user=root
# Proxmox uses the root user by default. Ensure your Control VM's SSH key is in Proxmox's /root/.ssh/authorized_keys

[k3s_cluster:vars]
ansible_user=dan
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_become=true
ansible_become_method=sudo
ansible_ssh_common_args='-o ControlMaster=no -o ControlPersist=no -o StrictHostKeyChecking=no'
