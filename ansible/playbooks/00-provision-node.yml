- name: Provision Ubuntu 26.04 node
  hosts: k3s_cluster
  become: yes
  gather_facts: yes

  tasks:

    - name: Ensure passwordless sudo for Ansible user
      copy:
        dest: /etc/sudoers.d/99-ansible-nopasswd
        content: "{{ ansible_user }} ALL=(ALL) NOPASSWD:ALL\n"
        mode: '0440'

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade system packages
      apt:
        upgrade: dist
        autoremove: yes

    - name: Install base packages
      apt:
        name:
          - curl
          - wget
          - git
          - jq
          - vim
          - nfs-common
          - net-tools
          - htop
          - unzip
          - ca-certificates
          - open-iscsi
          - wireguard-tools
        state: present

    - name: Configure Vim to disable mouse mode (restore classic paste behaviour)
      copy:
        dest: /etc/vim/vimrc.local
        content: |
          " Disable mouse so right-click pastes instead of entering visual mode
          set mouse=
          " Enable system clipboard integration
          set clipboard=unnamedplus
          " Optional: sane defaults
          set backspace=indent,eol,start
          syntax on
        owner: root
        group: root
        mode: '0644'

    - name: Install Intel GPU drivers
      apt:
        name:
          - intel-media-va-driver-non-free
          - i965-va-driver-shaders
          - vainfo
        state: present

    - name: Ensure /dev/dri exists
      stat:
        path: /dev/dri
      register: dri_path

    - name: Warn if GPU not detected
      debug:
        msg: "WARNING: /dev/dri not found — hardware acceleration may not work"
      when: not dri_path.stat.exists

    - name: Enable kernel modules for container workloads
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          br_netfilter
          overlay
          wireguard
          i915
        owner: root
        group: root
        mode: '0644'

    - name: Disable Swap (Required for k3s)
      command: swapoff -a
      when: ansible_facts.memory_mb.swap.total | default(0) > 0

    - name: Permanently Disable Swap in /etc/fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*swap.*)$'
        replace: '# \1'

    - name: Create Longhorn backup mount directory
      file:
        path: /mnt/backups
        state: directory
        mode: '0755'

    - name: Mount NFS backup target
      mount:
        path: /mnt/backups
        src: 192.168.10.120:/export/all/backups
        fstype: nfs
        opts: rw,sync,noatime,nodiratime,rsize=131072,wsize=131072
        state: mounted
        boot: yes
      notify: mount all filesystems

    - name: Ensure fstab ends with a newline
      lineinfile:
        path: /etc/fstab
        line: ""
        insertafter: EOF

    - name: Disable PCIe ASPM to prevent NIC resets
      replace:
        path: /etc/default/grub
        regexp: 'GRUB_CMDLINE_LINUX="(.*)"'
        replace: 'GRUB_CMDLINE_LINUX="\1 pcie_aspm=off"'
      notify: update grub

    # linux-modules-extra-* is not guaranteed to exist on Ubuntu 26 minimal kernels,
    # so we just assert the driver is present instead of forcing a package.
    - name: Ensure igc driver is present
      command: modinfo igc
      register: igc_info
      changed_when: false
      failed_when: igc_info.rc != 0

    - name: Disable NIC power saving (systemd-networkd)
      copy:
        dest: /etc/systemd/network/99-disable-power-saving.link
        content: |
          [Match]
          Driver=igc

          [Link]
          WakeOnLan=off
          PowerSave=off
        owner: root
        group: root
        mode: '0644'

    - name: Reload udev rules
      command: udevadm control --reload

    - name: Enable iSCSI Service
      systemd:
        name: iscsid
        enabled: yes
        state: started

    - name: Add user to 'render' group
      user:
        name: "{{ ansible_user }}"
        groups: render
        append: yes

    - name: Apply sysctl settings
      copy:
        dest: /etc/sysctl.d/99-k8s.conf
        content: |
          net.ipv4.ip_forward = 1
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
        owner: root
        group: root
        mode: '0644'

    - name: Reload sysctl
      command: sysctl --system

    - name: Reboot if required
      reboot:
        msg: "Rebooting after provisioning"
        connect_timeout: 5
        reboot_timeout: 600

  handlers:

    - name: update grub
      command: update-grub

    - name: restart networkmanager
      systemd:
        name: NetworkManager
        state: restarted
      when: "'NetworkManager.service' in ansible_facts.services | default({})"

    - name: mount all filesystems
      command: mount -a
