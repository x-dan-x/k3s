apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - seerr.yaml

helmCharts:
  - name: seerr-chart
    repo: oci://ghcr.io/seerr-team/seerr
    version: 3.7.0 
    releaseName: seerr
    namespace: seerr 
    valuesInline:
      # This natively forces the Service, StatefulSet, and Pods to be named "seerr-service"
      fullnameOverride: "seerr-service"

      env:
        - name: TRUST_PROXY
          value: "true"

      image:
        repository: ghcr.io/seerr-team/seerr
        tag: latest
        pullPolicy: IfNotPresent

      timezone: "Australia/Sydney"

      persistence:
        config:
          enabled: true
          mountPath: /app/config
          size: 5Gi

      service:
        type: ClusterIP
        port: 80

      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 1Gi
