---
- name: Install Cilium CNI on k3s
  hosts: k3s_cluster
  become: yes

  tasks:

    - name: Ensure Helm is installed
      shell: |
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    - name: Add Cilium Helm repo
      shell: helm repo add cilium https://helm.cilium.io
      args:
        creates: /root/.cache/helm/repository/cilium-index.yaml

    - name: Update Helm repos
      shell: helm repo update

    - name: Install Cilium with kube-proxy replacement
      shell: |
        helm upgrade --install cilium cilium/cilium \
          --namespace kube-system \
          --set kubeProxyReplacement=strict \
          --set k8sServiceHost={{ ansible_host }} \
          --set k8sServicePort=6443 \
          --set ipam.mode=kubernetes \
          --set bpf.masquerade=true \
          --set hubble.enabled=true \
          --set hubble.relay.enabled=true \
          --set hubble.ui.enabled=true

