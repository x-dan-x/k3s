apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: lan-gateway
  namespace: kube-system # <--- Generic infra location
spec:
  gatewayClassName: cilium
  infrastructure:
    annotations: {}
    labels:
      cilium.io/ingress: "true" # <--- Instructs Cilium to natively apply this label to the service!
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: All # <--- CRITICAL: Allows Longhorn, Plex, etc., to hook into it!
  - name: https
    protocol: HTTPS
    port: 443
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
      - name: dtx-lan-tls
