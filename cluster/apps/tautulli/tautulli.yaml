apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tautulli-config-pvc
  namespace: tautulli
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 4Gi # Tautulli databases are small, 4Gi is plenty
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tautulli-route
  namespace: tautulli
spec:
  parentRefs:
  - name: lan-gateway
    namespace: kube-system
  hostnames:
  - "tautulli.dtxlan.net"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: "tautulli-service"
      port: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tautulli
  namespace: tautulli # Adjust if you use a generic media/plex namespace
  labels:
    app: tautulli
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tautulli
  template:
    metadata:
      labels:
        app: tautulli
    spec:
      containers:
        - name: tautulli
          image: ghcr.io/tautulli/tautulli:latest
          imagePullPolicy: Always
          env:
            - name: PUID
              value: "1000" # Match your cluster storage UID
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Australia/Sydney"
          ports:
            - name: http
              containerPort: 8181
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: tautulli-config-pvc # Ensure this matches your PVC name
---
apiVersion: v1
kind: Service
metadata:
  name: tautulli-service
  namespace: tautulli
spec:
  ports:
    - port: 80
      targetPort: 8181
  selector:
    app: tautulli
