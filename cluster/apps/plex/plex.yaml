apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-config-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 40Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-omv-all-pv-plex # ◄── Unique name for this global PV handle
spec:
  capacity:
    storage: 100Ti
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-omv-all-plex # ◄── Unique matching string just for Plex
  mountOptions:
    - noatime
    - async
  nfs:
    server: 192.168.10.120 # ◄── Your OMV IP
    path: /export/all    # ◄── Your OMV Path
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-nfs-media-pvc
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-omv-all-plex # ◄── Explicitly matches the new PV tag above
  resources:
    requests:
      storage: 100Ti
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
  labels:
    app: plex
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: plex
  template:
    metadata:
      labels:
        app: plex
    spec:
      containers:
        - name: plex
          image: lscr.io/linuxserver/plex
          ports:
            - containerPort: 32400
              name: pms
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /data
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 4Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: plex-config-pvc
        - name: media
          persistentVolumeClaim:
            claimName: plex-nfs-media-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: plex-service
  labels:
    app: plex # ◄── Triggers Cilium IPPool match once your 01-ipam file is updated
spec:
  type: LoadBalancer
  ports:
    - port: 32400
      targetPort: 32400
      name: pms
  selector:
    app: plex
